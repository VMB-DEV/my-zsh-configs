# Put in ~/.config/starship.toml

add_newline = true

# First line: directory on left, git/kubernetes/tailscale on right, then second line with character
format = """$custom$time$directory$fill$git_branch$git_status$kubernetes${custom.tailscale}$nodejs$python$rust$golang$line_break$character"""

[directory]
truncation_length = 100
truncate_to_repo = false
home_symbol = "~"
format = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~/" = "_"

[fill]
symbol = " "

[line_break]
disabled = false

[character]
success_symbol = "[⩥](bold green)"
error_symbol = "[⩥](bold 218)"
vicmd_symbol = "[▣](bold 208)"

[kubernetes]
disabled = false
format = '[☸ [$context](bold blue)[:](blue)[$namespace](bold blue) ](bold blue)'

[git_branch]
symbol = "⎇  "
format = "[$symbol$branch]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'

[custom.time]
command = "date +%H:%M"
when = '[ -z "$SSH_CONNECTION" ]'
format = '[$output]($style) '
style = "dimmed yellow"

[custom.ssh]
command = "echo '.SSH.'"
when = '[ -n "$SSH_CONNECTION" ]'
format = "[$output]($style) "
style = "bold red"

[custom.username]
command = "echo $USER"
when = '[ -n "$SSH_CONNECTION" ]'
format = '[$output](yellow)'

[custom.idseparator]
command = "echo @"
when = '[ -n "$SSH_CONNECTION" ]'
format = '[$output](white)'

[custom.tailscale]
command = "tailscale status --peers=false 2>/dev/null | awk '{print $2\" (\"$1\")\"}'"
when = "tailscale ip -4 >/dev/null 2>&1"
format = "[ 🌐 $output]($style) "
style = "bold cyan"

[custom.hostname]
command = "hostname -s"
when = '[ -n "$SSH_CONNECTION" ]'
format = '[$output](yellow) '