# Put in ~/.config/starship.toml

add_newline = true

# First line: directory on left, git/kubernetes on right, then second line with character
format = """$env_var_SSH_CONNECTION$time$username$hostname$directory$fill$git_branch$git_status$kubernetes$nodejs$python$rust$golang$line_break$character"""

[username]
show_always = true
format = "[$user]($style)[@](orange)"
style_user = "yellow"

[hostname]
ssh_only = false
format = "[$hostname]($style) "
style = "yellow"

[directory]
truncation_length = 100
truncate_to_repo = false
home_symbol = "~"
format = "[$path]($style)[$read_only]($read_only_style) "

[directory.substitutions]
"~/" = "_"

[fill]
symbol = " "

[line_break]
disabled = false

[character]
success_symbol = "[⩥](bold green)"
error_symbol = "[⩥](bold 218)"
vicmd_symbol = "[▣](bold 208)"

[kubernetes]
disabled = false
format = '[☸ [$context](bold blue)[:](blue)[$namespace](bold blue) ](bold blue)'

[git_branch]
symbol = "⎇  "
format = "[$symbol$branch]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'

[time]
disabled = false
format = '[$time]($style) '
time_format = "%H:%M"
style = "dimmed yellow"

[env_var.SSH_CONNECTION]
variable = "SSH_CONNECTION"
format = "[SSH ]($style)"
style = "red" 
